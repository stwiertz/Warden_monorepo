# Warden Desktop Pipeline Configuration
# All tunable parameters for the video analysis tools

# Reference resolution — ROI coordinates below are defined at this resolution
# and will be scaled proportionally when processing at a different resolution
reference_resolution:
  width: 1920
  height: 1080

# Processing resolution — frames are downscaled to this height for analysis
# Lower = faster processing, higher = more accurate detection
processing:
  target_height: 720

# Black screen detection settings
black_detection:
  # Brightness threshold (0-255). A grayscale ROI region with mean pixel value
  # below this threshold is considered "black".
  brightness_threshold: 15

  # Seconds to skip after detecting a black screen, to avoid duplicate
  # detections from consecutive loading frames in the same transition.
  skip_duration: 15.0

  # Seconds before an end detection to also export a "pre-end" snapshot.
  # Useful for capturing score state before the black screen. Set to 0 to disable.
  pre_end_offset: 10.0

  # Number of consecutive keyframes that must pass start validation before
  # firing startLoading. Prevents triggering on transient lobby frames.
  start_confirm_frames: 2

  # ROI zones — both must be simultaneously black to confirm a transition.
  # Coordinates are at reference_resolution (1920x1080).
  roi_zones:
    - name: minimap
      x: 104
      y: 0
      width: 234
      height: 38

    - name: map_name
      x: 827
      y: 81
      width: 267
      height: 22

    - name: vertical
      x: 104
      y: 0
      width: 22
      height: 264

    - name: team_bar
      x: 430
      y: 1015
      width: 1060
      height: 65

    - name: personnalbar
      x: 648
      y: 990
      width: 12
      height: 20

    - name: points
      x: 956
      y: 42
      width: 6
      height: 15

    - name: kda
      x: 1197
      y: 1000
      width: 10
      height: 16

    - name: notkda
      x: 1215
      y: 1000
      width: 18
      height: 16

color:
  orange:
    h: 31
    s: 100
    v: 91
  bleu:
    h: 214
    s: 89
    v: 100
  white:
    h: 0
    s: 0
    v: 100

# Points ROI white detection — classifies in-game vs lobby by white text presence
points_detection:
  sat_max: 12          # Max saturation (0-255) for white classification
  val_min: 230         # Min value (0-255) for white classification
  min_ratio: 0.01      # Min fraction of white pixels to classify as in-game
  skip_duration: 15.0  # Seconds to skip after detecting an end transition
  start_confirm_frames: 2   # Consecutive white frames to confirm a start transition
  end_confirm_frames: 3     # Consecutive non-white frames to confirm an end transition
  score_offset: 14.5        # Seconds after last in-game KDA frame to extract score screen
  hud_brightness_max: 100  # Max gray mean for notkda ROI to confirm HUD presence (gameplay: 22-68, score screen: 136+)

# Team bar detection — used by the two-pass prescan for interval-mode videos
team_bar_detection:
  saturation_threshold: 90
  window_padding: 30.0

# Map identification — perceptual hashing for map name recognition
map_identification:
  # Legacy single ROI — kept for backward compatibility with map_config_generator.py
  roi:
    name: map_name_hash
    x: 827
    y: 81
    width: 267
    height: 22

  # ROI list for hash_comparator.py (multi-ROI comparison)
  # All coordinates at reference_resolution (1920x1080)
  rois:
    - name: map_name_hud
      x: 827
      y: 81
      width: 267
      height: 22

  # Standard canvas: ROI is resized to this fixed square before hashing
  canvas_size: 64

  # Perceptual hash size (hash_size=8 produces a 64-bit hash)
  hash_size: 8

  # Hash methods to compare in hash_comparator.py
  hash_methods: [ahash, dhash, phash]

  # Tiling strategy for canvas construction.
  # Split the ROI strip into this many equal columns and stack vertically before hashing.
  # 3 = split 267px wide strip into 3×89px columns → 89×66 tiled → resize to 64×64.
  # 1 = disabled (plain resize, old behavior).
  tile_cols: 3

  # Width in pixels @reference resolution (1920x1080) of the sub-ROI to hash,
  # anchored to the first white pixel column found in the ROI.
  # Set to 0 or omit to disable anchor cropping (use full ROI).
  text_anchor_width: 52

  # Minimum Hamming Distance between any two map hashes.
  # Below this threshold, maps are considered "too similar" and a warning is emitted.
  collision_threshold: 12

  # Max horizontal bit-shift to tolerate when comparing hashes.
  # 0 = exact match only. 1-2 = absorb sub-pixel text anchor variance across videos.
  # Each unit ≈ 1/hash_size of the ROI width (e.g. shift=2 on a 52px anchor @720p ≈ 13px).
  shift_tolerance: 2

  # Binarize the grayscale crop before hashing using Otsu's adaptive threshold.
  # Recommended for white text on variable-brightness backgrounds (e.g. map name HUD).
  threshold_hash: true

  # Minimum Hamming Distance to accept a map match. Scores >= this are marked 'unrecognized'.
  recognition_threshold: 10

  # Optional resolution sweep for hash_comparator.py.
  # Empty list = use source resolution only. Example: [1080, 720, 540, 360]
  resolutions: []

# Output settings
output:
  # Default output directory for extracted frames
  default_dir: ./output

  # Filename format: MMmSSs_type_seq.png (e.g. 07m12s_end_001.png)
  image_format: png
